<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario World - Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

iframe {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
  z-index: 1;
}

#overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.85);
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: opacity 0.6s ease-out;
}
#overlay.fade-out {
  opacity: 0;
  pointer-events: none;
}

.dialog-box {
  background: #1a1a8c;
  border: 4px solid #fff;
  border-radius: 12px;
  padding: 28px 24px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow:
    0 0 0 4px #1a1a8c,
    0 0 0 8px #fff,
    0 0 40px rgba(26, 26, 140, 0.6);
  position: relative;
}

/* Inner border for authentic SNES double-border look */
.dialog-box::before {
  content: '';
  position: absolute;
  top: 4px; left: 4px; right: 4px; bottom: 4px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 8px;
  pointer-events: none;
}

.dialog-box img {
  max-width: 340px;
  width: 100%;
  border-radius: 4px;
  border: 2px solid #fff;
  margin-bottom: 20px;
  image-rendering: auto;
}

.dialog-box h1 {
  font-family: 'Press Start 2P', cursive;
  font-size: clamp(14px, 3vw, 20px);
  color: #ffcc00;
  text-shadow: 2px 2px 0 #8b6914;
  margin-bottom: 16px;
  line-height: 1.6;
}

.dialog-box p {
  font-family: 'Press Start 2P', cursive;
  font-size: clamp(8px, 1.8vw, 11px);
  color: #fff;
  line-height: 2;
  margin-bottom: 8px;
}

.dialog-box .blink {
  font-family: 'Press Start 2P', cursive;
  font-size: clamp(8px, 1.6vw, 10px);
  color: #ffcc00;
  margin-top: 20px;
  animation: blink 1.2s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
</style>
</head>
<body>

<iframe id="game" src="./mario/index.html"></iframe>

<div id="overlay">
  <div class="dialog-box">
    <img src="./mario-dialog.png" alt="Tattoo Mario World">
    <h1>BETO LEVEL UP!</h1>
    <p>Slackware + Mario + Tattoo</p>
    <p>Some legends are permanent.</p>
    <div class="blink">&#9660; PRESS ANY KEY TO PLAY &#9660;</div>
  </div>
</div>

<script>
(function() {
  var overlay = document.getElementById('overlay');
  var dismissed = false;

  function dismiss() {
    if (dismissed) return;
    dismissed = true;
    overlay.classList.add('fade-out');
    // Focus iframe so game receives input
    setTimeout(function() {
      overlay.style.display = 'none';
      var game = document.getElementById('game');
      game.focus();
    }, 600);
  }

  document.addEventListener('click', dismiss);
  document.addEventListener('keydown', dismiss);
  document.addEventListener('touchstart', dismiss);
})();
</script>
</body>
</html>
